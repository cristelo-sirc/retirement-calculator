<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Compass &middot; The Retirement Issue &middot; V19.3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body { background: #f6f2ea; font-family: Inter, -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(26,24,21,0.2); border-radius: 5px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Real engine adapter: defines window.MockEngine and loads engine.js (math) after DOMContentLoaded -->
  <script src="cover-app/real-engine.js?v=19.3"></script>
</head>
<body>
  <div id="root"></div>

  <!-- The mockup design components (the exact handoff UI) -->
  <script src="cover-app/numeric-entry.js?v=19.3"></script>
  <script type="text/babel" src="cover-app/retire-ui.jsx?v=19.3"></script>
  <script type="text/babel" src="cover-app/retire-charts.jsx?v=19.3"></script>
  <script type="text/babel" src="cover-app/compass-cover.jsx?v=19.3b"></script>
  <script type="text/babel" src="cover-app/cover-inputs.jsx?v=19.3"></script>
  <script type="text/babel" src="cover-app/cover-mobile.jsx?v=19.3"></script>

  <!-- App shell: one shared params state across all screens; nav switches screens -->
  <script type="text/babel">
    const { useState, useEffect } = React;
    const SAVE_KEY = 'compassParams';

    function App() {
      const [screen, setScreen] = useState('cover');
      const [params, setParams] = useState(() => {
        try { var s = localStorage.getItem(SAVE_KEY); if (s) return window.MockEngine.normalizeParams(JSON.parse(s)).params; } catch (e) {}
        return window.MockEngine.DEFAULTS;
      });
      // Welcome launch screen shows on every load. hasSession = a personalized
      // saved plan already exists (saved params differ from the defaults).
      const [started, setStarted] = useState(false);
      const [hasSession] = useState(() => {
        try {
          var s = localStorage.getItem(SAVE_KEY);
          if (!s) return false;
          var saved = window.MockEngine.normalizeParams(JSON.parse(s)).params;
          return JSON.stringify(saved) !== JSON.stringify(window.MockEngine.DEFAULTS);
        } catch (e) { return false; }
      });
      const [isMobile, setIsMobile] = useState(window.innerWidth < 769);
      // V19.1: freshStart is a one-shot flag — true only for the visit right after
      // Welcome → "Start a new plan", so the Questionnaire's "Returning? Load your saved
      // plan" callout doesn't contradict a choice the user just made. Any navigation away
      // from the Questionnaire clears it, so a later return is treated normally.
      const [freshStart, setFreshStart] = useState(false);
      useEffect(() => { window._coverNav = (id) => { setScreen(id); if (id !== 'quiz') setFreshStart(false); }; }, []);
      // V19.1: Cover is read-only; tapping one of its move cards opens Rework with that
      // move already staged as an unpublished draft. stageLever is a one-shot id, cleared
      // by CoverAdjust once it has applied the matching lever.
      const [stageLever, setStageLever] = useState(null);
      const openReworkWithLever = (leverId) => { setStageLever(leverId); setScreen('rework'); };
      useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth < 769);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      // Persist params across refreshes (private to this browser; no data in the repo)
      useEffect(() => { try { localStorage.setItem(SAVE_KEY, JSON.stringify(params)); } catch (e) {} }, [params]);

      const beginContinue = () => setStarted(true);
      const beginLoad = (loaded) => { setParams(loaded); setScreen('cover'); setStarted(true); };
      const beginNew = () => {
        if (hasSession && !window.confirm('Starting a new plan replaces the plan saved in this browser. You can Save it to a file first. Continue?')) return;
        setParams(window.MockEngine.DEFAULTS);
        setScreen('quiz');
        setFreshStart(true);
        setStarted(true);
      };

      if (!started) return <CoverWelcome hasSession={hasSession} onContinue={beginContinue} onStartNew={beginNew} onLoaded={beginLoad} />;

      const shared = { params, setParams };
      if (isMobile)             return <CoverMobile {...shared} initialTab={screen === 'quiz' ? 'quiz' : 'cover'} freshStart={freshStart} />;
      if (screen === 'quiz')    return <CoverInputs mode="detailed" {...shared} freshStart={freshStart} />;
      if (screen === 'rework')  return <CoverAdjust {...shared} stageLever={stageLever} onLeverStaged={() => setStageLever(null)} />;
      if (screen === 'chart')   return <CoverCharts {...shared} />;
      return <CoverDesktop {...shared} onOpenRework={openReworkWithLever} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <div style={{ fontFamily: 'Inter, sans-serif', padding: 48, color: '#1a181580',
        fontSize: 13, letterSpacing: '0.16em', textTransform: 'uppercase' }}>
        Running your plan&hellip;
      </div>
    );
    window._engineReady.then(() => root.render(<App />));
  </script>
</body>
</html>
