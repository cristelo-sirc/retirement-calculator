<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Compass &middot; The Retirement Issue &middot; V19.11</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body { background: #f6f2ea; font-family: Inter, -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(26,24,21,0.2); border-radius: 5px; }
  </style>
  <!-- V19.11: self-hosted (was CDN via unpkg.com) so the app never depends on an outside
       server to load. Production builds (smaller/faster than the dev builds these replaced;
       dev builds print extra console warnings we don't need in the shipped app). Exact
       official npm files, verified byte-for-byte against npm's published checksums before
       being added to this repo — see CLAUDE.md V19.11 for the verification record. -->
  <script src="vendor/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" onerror="window._vendorLoadFailed('React')"></script>
  <script src="vendor/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" onerror="window._vendorLoadFailed('ReactDOM')"></script>
  <script src="vendor/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" onerror="window._vendorLoadFailed('Babel')"></script>

  <!-- V19.11: plain (non-React, non-Babel) safety net. If any script on this page fails to
       load, this shows a clear message instead of leaving the visitor staring at a stuck
       "Running your plan..." spinner or a blank page. Deliberately has zero dependencies on
       React/Babel above, since those are exactly what might have failed to load. -->
  <script>
    window._vendorLoadFailed = function (name) {
      console.error('Failed to load ' + name);
      var root = document.getElementById('root');
      if (!root || root.dataset.appRendered === 'true') return; // don't clobber a working app
      root.innerHTML = '<div style="max-width:520px;margin:15vh auto;padding:32px;' +
        'font-family:Inter,-apple-system,system-ui,sans-serif;text-align:center;color:#1a1815;">' +
        '<div style="font-size:15px;font-weight:600;margin-bottom:8px;">Something did not load</div>' +
        '<div style="font-size:14px;color:#1a1815b3;">Please check your connection and refresh the page.</div></div>';
    };
  </script>

  <!-- Real engine adapter: defines window.MockEngine and loads engine.js (math) after DOMContentLoaded -->
  <script src="cover-app/real-engine.js?v=19.11b"></script>
</head>
<body>
  <div id="root"></div>

  <!-- The mockup design components (the exact handoff UI) -->
  <script src="cover-app/numeric-entry.js?v=19.11"></script>
  <script type="text/babel" src="cover-app/retire-ui.jsx?v=19.11"></script>
  <script type="text/babel" src="cover-app/retire-charts.jsx?v=19.11"></script>
  <script type="text/babel" src="cover-app/compass-cover.jsx?v=19.11b"></script>
  <script type="text/babel" src="cover-app/cover-inputs.jsx?v=19.11b"></script>
  <script type="text/babel" src="cover-app/cover-mobile.jsx?v=19.11"></script>

  <!-- App shell: one shared params state across all screens; nav switches screens -->
  <script type="text/babel">
    const { useState, useEffect } = React;
    const SAVE_KEY = 'compassParams';

    function App() {
      const [screen, setScreen] = useState('cover');
      // V19.9 (B3): the ONE place params change. Every write is normalized here — cross-field
      // rules (age ordering, ranges) are applied at this shared boundary, not only inside a
      // private copy in compute(). So what the user SEES, what is persisted to localStorage, what
      // a saved file contains, and what the engine computes on are all the SAME normalized state.
      // Previously the form kept a raw, self-contradictory value (e.g. current age 65 while
      // retirement age still showed 65) while the engine silently used a corrected 66.
      const [adjustNote, setAdjustNote] = useState(null);
      const [params, setParamsRaw] = useState(() => {
        try { var s = localStorage.getItem(SAVE_KEY); if (s) return window.MockEngine.normalizeParams(JSON.parse(s)).params; } catch (e) {}
        return window.MockEngine.normalizeParams(window.MockEngine.DEFAULTS).params;
      });
      const setParams = React.useCallback((updater) => {
        setParamsRaw(prev => {
          const next = (typeof updater === 'function') ? updater(prev) : updater;
          const norm = window.MockEngine.normalizeParams(next);
          setAdjustNote((norm.notes && norm.notes.length) ? norm.notes.slice() : null);
          return norm.params;
        });
      }, []);
      // Welcome launch screen shows on every load. hasSession = a personalized
      // saved plan already exists (saved params differ from the defaults).
      const [started, setStarted] = useState(false);
      const [hasSession] = useState(() => {
        try {
          var s = localStorage.getItem(SAVE_KEY);
          if (!s) return false;
          var saved = window.MockEngine.normalizeParams(JSON.parse(s)).params;
          return JSON.stringify(saved) !== JSON.stringify(window.MockEngine.DEFAULTS);
        } catch (e) { return false; }
      });
      const [isMobile, setIsMobile] = useState(window.innerWidth < 769);
      // V19.1: freshStart is a one-shot flag — true only for the visit right after
      // Welcome → "Start a new plan", so the Questionnaire's "Returning? Load your saved
      // plan" callout doesn't contradict a choice the user just made. Any navigation away
      // from the Questionnaire clears it, so a later return is treated normally.
      const [freshStart, setFreshStart] = useState(false);
      useEffect(() => { window._coverNav = (id) => { setScreen(id); setAdjustNote(null); if (id !== 'quiz') setFreshStart(false); }; }, []);
      // V19.1: Cover is read-only; tapping one of its move cards opens Rework with that
      // move already staged as an unpublished draft. stageLever is a one-shot id, cleared
      // by CoverAdjust once it has applied the matching lever.
      const [stageLever, setStageLever] = useState(null);
      const openReworkWithLever = (leverId) => { setStageLever(leverId); setScreen('rework'); };
      useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth < 769);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      // Persist params across refreshes (private to this browser; no data in the repo)
      useEffect(() => { try { localStorage.setItem(SAVE_KEY, JSON.stringify(params)); } catch (e) {} }, [params]);

      const beginContinue = () => setStarted(true);
      const beginLoad = (loaded) => { setParams(loaded); setScreen('cover'); setStarted(true); };
      const beginNew = () => {
        if (hasSession && !window.confirm('Starting a new plan replaces the plan saved in this browser. You can Save it to a file first. Continue?')) return;
        setParams(window.MockEngine.DEFAULTS);
        setScreen('quiz');
        setFreshStart(true);
        setStarted(true);
      };

      if (!started) return <CoverWelcome hasSession={hasSession} onContinue={beginContinue} onStartNew={beginNew} onLoaded={beginLoad} />;

      const shared = { params, setParams };
      if (isMobile)             return <CoverMobile {...shared} adjustNote={adjustNote} initialTab={screen === 'quiz' ? 'quiz' : 'cover'} freshStart={freshStart} onTabChange={(id) => setScreen(id)} />;
      if (screen === 'quiz')    return <CoverInputs mode="detailed" {...shared} adjustNote={adjustNote} freshStart={freshStart} />;
      if (screen === 'rework')  return <CoverAdjust {...shared} stageLever={stageLever} onLeverStaged={() => setStageLever(null)} />;
      if (screen === 'chart')   return <CoverCharts {...shared} />;
      return <CoverDesktop {...shared} onOpenRework={openReworkWithLever} />;
    }

    // V19.11: honest engine-load-failure screen. window._engineReady (set in real-engine.js)
    // resolves true only if engine.js (the math file) loaded successfully; it resolves false
    // (never hangs, never rejects) if that script 404s or errors, so this .then always fires
    // either way. Previously this callback ignored the value and rendered <App/> regardless,
    // which meant a failed engine.js load left an app that looked fine until it crashed the
    // moment a screen tried to compute a plan.
    function EngineLoadError() {
      return (
        <div style={{ maxWidth: 520, margin: '15vh auto', padding: 32,
          fontFamily: 'Inter, sans-serif', textAlign: 'center', color: '#1a1815' }}>
          <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 8 }}>Something did not load</div>
          <div style={{ fontSize: 14, color: '#1a1815b3' }}>Please check your connection and refresh the page.</div>
        </div>
      );
    }

    const rootEl = document.getElementById('root');
    const root = ReactDOM.createRoot(rootEl);
    root.render(
      <div style={{ fontFamily: 'Inter, sans-serif', padding: 48, color: '#1a181580',
        fontSize: 13, letterSpacing: '0.16em', textTransform: 'uppercase' }}>
        Running your plan&hellip;
      </div>
    );
    window._engineReady.then((engineLoaded) => {
      if (!engineLoaded) { root.render(<EngineLoadError />); return; }
      rootEl.dataset.appRendered = 'true'; // tells the plain-JS vendor-failure fallback to stand down
      root.render(<App />);
    });
  </script>
</body>
</html>
