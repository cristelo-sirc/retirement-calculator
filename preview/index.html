<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>07 — Cover · Design Handoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: Inter, -apple-system, system-ui, sans-serif;
      background: #2a2722;
      color: #f6f2ea;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; }
    .rail-btn { transition: background 120ms, color 120ms; }
    .rail-btn:hover { background: rgba(255,255,255,0.06); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 5px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Engine + design source (the exact files to lift into the app) -->
  <script src="src/mock-engine.js"></script>
  <script type="text/babel" src="src/retire-ui.jsx"></script>
  <script type="text/babel" src="src/retire-charts.jsx"></script>
  <script type="text/babel" src="src/compass-cover.jsx"></script>
  <script type="text/babel" src="src/cover-inputs.jsx"></script>
  <script type="text/babel" src="src/cover-mobile.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SCREENS = [
      { id: 'questionnaire', n: '01', label: 'Questionnaire', sub: 'The chosen intake — “Everything shown.” Every engine input is visible, with an Advanced toggle for the assumption-level dials.', w: 1440, h: 900, node: <CoverInputs mode="detailed" /> },
      { id: 'cover', n: '02', label: 'Cover', sub: 'The magazine cover — the success number IS the hero art. Scroll for the full “article” below the fold.', w: 1440, h: 900, node: <CoverDesktop /> },
      { id: 'rework', n: '03', label: 'Rework', sub: 'What-if sandbox. Diff-chips show what changed and reset in one click; nothing is saved until Publish.', w: 1440, h: 900, node: <CoverAdjust /> },
      { id: 'projection', n: '04', label: 'Projection', sub: 'Balance fan chart + income-by-source over time, with the four headline stats.', w: 1440, h: 900, node: <CoverCharts /> },
      { id: 'odds', n: '05', label: 'Income & Odds', sub: 'Glide-path mix over time + side-by-side scenario comparison.', w: 1440, h: 900, node: <CoverCharts2 /> },
      { id: 'mobile', n: '06', label: 'Mobile', sub: 'Phone view. Cover and Questionnaire as two tabs; 42px touch targets, single column.', w: 390, h: 844, node: <CoverMobile /> },
    ];

    function Stage({ screen }) {
      const ref = useRef(null);
      const [scale, setScale] = useState(1);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const compute = () => {
          const pad = 96;
          const aw = el.clientWidth - pad;
          const ah = el.clientHeight - pad;
          setScale(Math.max(0.1, Math.min(aw / screen.w, ah / screen.h, 1)));
        };
        compute();
        const ro = new ResizeObserver(compute);
        ro.observe(el);
        return () => ro.disconnect();
      }, [screen]);
      const isPhone = screen.id === 'mobile';
      return (
        <div ref={ref} style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
          overflow: 'hidden', position: 'relative' }}>
          <div style={{ width: screen.w * scale, height: screen.h * scale, position: 'relative' }}>
            <div style={{ width: screen.w, height: screen.h, transform: `scale(${scale})`, transformOrigin: 'top left',
              borderRadius: isPhone ? 30 : 4, overflow: 'hidden',
              boxShadow: '0 30px 80px rgba(0,0,0,0.45)', border: isPhone ? '8px solid #111' : '1px solid rgba(0,0,0,0.2)' }}>
              {screen.node}
            </div>
          </div>
        </div>
      );
    }

    function Viewer() {
      const [active, setActive] = useState('questionnaire');
      const screen = SCREENS.find(s => s.id === active);
      return (
        <div style={{ display: 'flex', height: '100%' }}>
          {/* Left rail */}
          <aside style={{ width: 280, flex: '0 0 auto', borderRight: '1px solid rgba(255,255,255,0.1)',
            display: 'flex', flexDirection: 'column', background: '#211e1a' }}>
            <div style={{ padding: '26px 24px 20px', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
              <div style={{ fontFamily: '"DM Serif Display", serif', fontSize: 26, lineHeight: 1.05 }}>Compass</div>
              <div style={{ fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase',
                color: 'rgba(246,242,234,0.5)', marginTop: 8 }}>Concept 07 · Cover · Handoff</div>
            </div>
            <nav style={{ flex: 1, overflowY: 'auto', padding: '12px 12px 24px' }}>
              {SCREENS.map(s => {
                const on = s.id === active;
                return (
                  <button key={s.id} className="rail-btn" onClick={() => setActive(s.id)}
                    style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                      background: on ? 'rgba(255,255,255,0.1)' : 'transparent', color: 'inherit',
                      padding: '12px 14px', borderRadius: 6, marginBottom: 2, fontFamily: 'inherit' }}>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 9 }}>
                      <span style={{ fontSize: 11, color: 'rgba(246,242,234,0.4)', fontVariantNumeric: 'tabular-nums' }}>{s.n}</span>
                      <span style={{ fontFamily: '"DM Serif Display", serif', fontSize: 18,
                        color: on ? '#f6f2ea' : 'rgba(246,242,234,0.8)' }}>{s.label}</span>
                    </div>
                    {on && <div style={{ fontSize: 12, lineHeight: 1.45, color: 'rgba(246,242,234,0.55)',
                      marginTop: 6, paddingLeft: 20 }}>{s.sub}</div>}
                  </button>
                );
              })}
            </nav>
            <div style={{ padding: '16px 24px 22px', borderTop: '1px solid rgba(255,255,255,0.1)',
              fontSize: 11.5, lineHeight: 1.5, color: 'rgba(246,242,234,0.45)' }}>
              Live & interactive — drag sliders, open the Advanced toggle, switch the partner segment.
              Specs in <strong style={{ color: 'rgba(246,242,234,0.7)' }}>HANDOFF.md</strong>.
            </div>
          </aside>

          {/* Stage */}
          <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
            <div style={{ padding: '20px 32px', borderBottom: '1px solid rgba(255,255,255,0.1)',
              display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 20 }}>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 12 }}>
                <span style={{ fontFamily: '"DM Serif Display", serif', fontSize: 22 }}>{screen.label}</span>
                <span style={{ fontSize: 12, color: 'rgba(246,242,234,0.45)' }}>{screen.w} × {screen.h}</span>
              </div>
              <span style={{ fontSize: 12, color: 'rgba(246,242,234,0.45)', maxWidth: 540, textAlign: 'right',
                lineHeight: 1.4 }}>{screen.sub}</span>
            </div>
            <Stage screen={screen} />
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Viewer />);
  </script>
</body>
</html>
